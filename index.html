<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghana Multi-Portal System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 26px;
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }
        .sub {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
        }
        .btn-student { background: #9f7aea; }
        .btn-parent { background: #ed8936; }
        .btn-teacher { background: #48bb78; }
        .btn-farmer { background: #38b2ac; }
        .btn-back { background: #a0aec0; }
        .info {
            background: #bee3f8;
            padding: 12px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 14px;
        }
        .success {
            background: #c6f6d5;
            padding: 12px;
            border-radius: 10px;
            margin: 10px 0;
            color: #22543d;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .metric {
            background: #f7fafc;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .metric-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        hr {
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        // ============ USERS DATABASE ============
        let users = {
            "kwame": { pass: "123456", role: "student", name: "Kwame Asante", fees: 3500, paid: false, results: { Math: 85, Science: 78, English: 82 } },
            "adwoa": { pass: "123456", role: "student", name: "Adwoa Mensah", fees: 1200, paid: false, results: { Math: 72, Science: 68, English: 75 } },
            "mr.ofori": { pass: "123456", role: "parent", child: "Abena Ofori", class: "Primary 4", results: { Math: 88, English: 85, Science: 80 } },
            "teacher1": { pass: "123456", role: "teacher" },
            "farmer1": { pass: "123456", role: "farmer" },
            "kingsford": { pass: "Kingsford@97", role: "admin" }
        };
        
        let currentUser = null;
        let currentPage = null;
        
        function show(page) {
            const app = document.getElementById("app");
            if (!currentUser) {
                showLogin(app);
            } else if (!currentPage) {
[13/06/2026 12:48 pm] Kingsford Okyere: showHome(app);
            } else if (currentPage === "student") {
                showStudent(app);
            } else if (currentPage === "parent") {
                showParent(app);
            } else if (currentPage === "teacher") {
                showTeacher(app);
            } else if (currentPage === "farmer") {
                showFarmer(app);
            }
        }
        
        function showLogin(container) {
            container.innerHTML = `
                <div class="card">
                    <h1>🇬🇭 Multi-Portal System</h1>
                    <div class="sub">Students | Parents | Teachers | Farmers</div>
                    <input type="text" id="user" placeholder="Username">
                    <input type="password" id="pass" placeholder="Password">
                    <button onclick="doLogin()">Login</button>
                    <div class="info"><b>Test Logins:</b><br>
                    🎓 Student: kwame / 123456<br>
                    👨‍👩‍👧 Parent: mr.ofori / 123456<br>
                    👨‍🏫 Teacher: teacher1 / 123456<br>
                    🌾 Farmer: farmer1 / 123456<br>
                    👑 Admin: kingsford / Kingsford@97</div>
                </div>
            `;
        }
        
        window.doLogin = function() {
            const user = document.getElementById("user").value;
            const pass = document.getElementById("pass").value;
            if (users[user] && users[user].pass === pass) {
                currentUser = user;
                show();
            } else {
                alert("Invalid username or password");
            }
        };
        
        function showHome(container) {
            const role = users[currentUser].role;
            container.innerHTML = `
                <div class="card">
                    <h1>🇬🇭 Welcome, ${currentUser}!</h1>
                    <div class="sub">Role: ${role}</div>
                    <hr>
                    <button class="btn-student" onclick="goTo('student')">🎓 Student Portal</button>
                    <button class="btn-parent" onclick="goTo('parent')">👨‍👩‍👧 Parent Portal</button>
                    <button class="btn-teacher" onclick="goTo('teacher')">👨‍🏫 Teacher Portal</button>
                    <button class="btn-farmer" onclick="goTo('farmer')">🌾 Farmers Portal</button>
                    <button onclick="logout()">Logout</button>
                </div>
            `;
        }
        
        window.goTo = function(page) {
            currentPage = page;
            show();
        };
        
        window.logout = function() {
            currentUser = null;
            currentPage = null;
            show();
        };
        
        function showStudent(container) {
            const u = users[currentUser];
            const results = u.results || {};
            container.innerHTML = `
                <div class="card">
                    <h1>🎓 Student Portal</h1>
                    <div class="sub">${u.name}</div>
                    <div class="grid-2">
                        <div class="metric"><div class="metric-value">GHS ${u.fees}</div><div class="metric-label">Fees</div></div>
                        <div class="metric"><div class="metric-value">${u.paid ? '✅ Paid' : '❌ Pending'}</div><div class="metric-label">Status</div></div>
                    </div>
                    <h3>💰 Pay Fees</h3>
                    <select id="bank"><option>GCB Bank</option><option>Ecobank</option><option>Stanbic</option><option>Absa</option></select>
                    <input type="text" id="ref" placeholder="Reference Number">
                    <button onclick="payFees()">Confirm Payment</button>
                    <h3>📊 Results</h3>
                    <table>${Object.entries(results).map(([s,sc]) => `<tr><td>${s}</td><td>${sc}%</td></tr>`).join('')}</table>
                    <h3>📚 Register Course</h3>
                    <select id="course"><option>Math</option><option>English</option><option>Science</option><option>Computing</option></select>
[13/06/2026 12:48 pm] Kingsford Okyere: <button onclick="registerCourse()">Register</button>
                    <h3>📝 Upload Assignment</h3>
                    <input type="text" id="title" placeholder="Title">
                    <textarea id="content" rows="2" placeholder="Details" style="width:100%;padding:10px;"></textarea>
                    <button onclick="uploadAssign()">Upload</button>
                    <button class="btn-back" onclick="goBack()">← Back</button>
                </div>
            `;
        }
        
        window.payFees = function() {
            const ref = document.getElementById("ref").value;
            if(ref) {
                users[currentUser].paid = true;
                alert("Payment confirmed! Reference: " + ref);
                show();
            } else alert("Enter reference number");
        };
        
        window.registerCourse = function() {
            alert("Course registered: " + document.getElementById("course").value);
        };
        
        window.uploadAssign = function() {
            const title = document.getElementById("title").value;
            if(title) alert("Assignment uploaded: " + title);
            else alert("Enter title");
        };
        
        function showParent(container) {
            const u = users[currentUser];
            const results = u.results || {};
            container.innerHTML = `
                <div class="card">
                    <h1>👨‍👩‍👧 Parent Portal</h1>
                    <div class="sub">Child: ${u.child} (${u.class})</div>
                    <h3>📊 Results</h3>
                    <table>${Object.entries(results).map(([s,sc]) => `<tr><td>${s}</td><td>${sc}%</td></tr>`).join('')}</table>
                    <button class="btn-back" onclick="goBack()">← Back</button>
                </div>
            `;
        }
        
        function showTeacher(container) {
            container.innerHTML = `
                <div class="card">
                    <h1>👨‍🏫 Teacher Portal</h1>
                    <div class="info">📚 WAEC Resources</div>
                    <div class="info">📝 Lesson Plans</div>
                    <div class="info">📊 Student Assessment</div>
                    <div class="info">✅ GES Curriculum</div>
                    <button class="btn-back" onclick="goBack()">← Back</button>
                </div>
            `;
        }
        
        function showFarmer(container) {
            let crops = [{n:"Maize",p:3.5},{n:"Cassava",p:2},{n:"Yam",p:8},{n:"Cocoa",p:12},{n:"Rice",p:6.5}];
            let myCrops = [];
            
            function updateCrops() {
                const list = document.getElementById("cropList");
                if(list) list.innerHTML = myCrops.map(c => `<div class="info">🌾 ${c.n}: ${c.w}kg = GHS ${(c.w * c.p).toFixed(2)}</div>`).join('');
            }
            
            container.innerHTML = `
                <div class="card">
                    <h1>🌾 Farmers Portal</h1>
                    <h3>💰 Crop Prices</h3>
                    <table>${crops.map(c => `<tr><td>${c.n}</td><td>GHS ${c.p}/kg</td></tr>`).join('')}</table>
                    <h3>🌤 Weather</h3>
                    <div class="info">📍 Accra: 32°C ☀️</div>
                    <div class="info">📍 Kumasi: 28°C ⛅️</div>
                    <div class="info">📍 Tamale: 35°C ☀️</div>
                    <h3>🌱 My Crops</h3>
                    <select id="cropSelect">${crops.map(c => `<option value="${c.n}">${c.n}</option>`).join('')}</select>
                    <input type="number" id="weight" placeholder="Weight (kg)">
                    <button onclick="addCrop()">Add Crop</button>
                    <div id="cropList"></div>
                    <button class="btn-back" onclick="goBack()">← Back</button>
                </div>
            `;
            
            window.addCrop = function() {
                const name = document.getElementById("cropSelect").value;
                const weight = parseFloat(document.getElementById("weight").value);
[13/06/2026 12:48 pm] Kingsford Okyere: const crop = crops.find(c => c.n === name);
                if(weight > 0) {
                    myCrops.push({n:name, w:weight, p:crop.p});
                    updateCrops();
                    document.getElementById("weight").value = "";
                }
            };
            updateCrops();
        }
        
        window.goBack = function() {
            currentPage = null;
            show();
        };
        
        show();
    </script>
</body>
</html>
